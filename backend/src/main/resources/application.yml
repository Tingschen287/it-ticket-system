server:
  port: 8080

spring:
  application:
    name: it-ticket-system

  datasource:
    url: jdbc:postgresql://localhost:5432/it_ticket_db
    username: mac
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

jwt:
  secret: it-ticket-system-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000

logging:
  level:
    com.itticket: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
